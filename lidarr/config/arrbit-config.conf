################################################################################
# Arrbit Main Configuration
################################################################################

################################################################################
# COMMUNITY PLUGIN INSTALLATION SETTINGS
################################################################################

# Enable installation of community plugins (Deezer, Tidal, Tubifarry)
ENABLE_COMMUNITY_PLUGINS="false"

# Individual plugin toggles:
#   When ENABLE_COMMUNITY_PLUGINS="true", these control which are installed.
INSTALL_PLUGIN_DEEZER="false"    # Install the Deezer download plugin
INSTALL_PLUGIN_TIDAL="false"     # Install the Tidal download plugin
INSTALL_PLUGIN_TUBIFARRY="false" # Install the Tubifarry (TypNull) plugin

################################################################################
# AUTO-CONFIGURATION SETTINGS
################################################################################

# Enable automatic configuration of Lidarr modules via autoconfig.bash
ENABLE_AUTOCONFIG="true"

# Per-module feature flags (only used if ENABLE_AUTOCONFIG="true"):
# CONFIGURE_MEDIA_MANAGEMENT    → Configure media management settings (paths, rename/move)
CONFIGURE_MEDIA_MANAGEMENT="false"
# CONFIGURE_METADATA_CONSUMER   → Enable/disable metadata consumers (indexers)
CONFIGURE_METADATA_CONSUMER="false"
# CONFIGURE_METADATA_PROVIDER   → Write metadata to files (metadata_write.bash)
CONFIGURE_METADATA_PROVIDER="false"
# CONFIGURE_METADATA_PLUGIN     → Configure metadata plugins (e.g., cover art, tags)
CONFIGURE_METADATA_PLUGIN="false"
# CONFIGURE_METADATA_PROFILES   → Set up metadata import profiles
CONFIGURE_METADATA_PROFILES="false"
# CONFIGURE_TRACK_NAMING        → Define file & folder naming conventions
CONFIGURE_TRACK_NAMING="false"
# CONFIGURE_UI_SETTINGS         → Adjust Lidarr’s UI preferences (language, theme)
CONFIGURE_UI_SETTINGS="false"
# CONFIGURE_CUSTOM_SCRIPTS      → Run any user-provided post-processing scripts
CONFIGURE_CUSTOM_SCRIPTS="false"
# CONFIGURE_CUSTOM_FORMATS      → Import custom release format JSONs
CONFIGURE_CUSTOM_FORMATS="false"
# CONFIGURE_DELAY_PROFILES      → Set download delay profiles for each protocol
CONFIGURE_DELAY_PROFILES="false"
# (Removed CONFIGURE_QUALITY_PROFILE from here)

################################################################################
# CUSTOM FORMATS & QUALITY SETTINGS
################################################################################

# If you want to override or extend these with your own JSONs, drop them
# into process_scripts/modules/custom_formats/ on GitHub before running setup.
ENABLE_CUSTOM_FORMATS="false"
# CONFIGURE_QUALITY_PROFILE     → Configure the quality profile (cutoff, definitions) ONLY when custom formats are enabled
CONFIGURE_QUALITY_PROFILE="true"

################################################################################
# (Optional) BEETS INTEGRATION
################################################################################

# If you use Beets for tagging/organizing, point to your config here:
# BEETS_CONFIG_PATH="/config/arrbit/beets-config.yaml"

################################################################################
# END OF CONFIGURATION
################################################################################
